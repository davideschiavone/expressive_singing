<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expressive Singing | Coming Soon</title>
    <style>
        :root {
            --bg-color: #f5eee6; /* Il beige dello sfondo logo */
            --navy: #1a2238;    /* Il blu scuro del testo */
            --red: #d1493e;     /* Il rosso del logo */
            --yellow: #f2b731;  /* Il giallo del logo */
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--navy);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        button {
            background: var(--navy);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        .logo {
            max-width: 250px;
            height: auto;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
        }

        .status-tag {
            display: inline-block;
            background: var(--red);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        [lang="fr"] { display: none; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button onclick="toggleLang()" id="langBtn">FR</button>
    </div>

    <img src="logo.png" alt="Expressive Singing Logo" class="logo">

    <div id="en-content" lang="en">
        <div class="status-tag">UNDER CONSTRUCTION</div>
        <h1>Expressive Singing</h1>
        <p>We are currently tuning our voices. Our new platform for expressive vocal art is coming soon.</p>
    </div>

    <div id="fr-content" lang="fr">
        <div class="status-tag">EN CONSTRUCTION</div>
        <h1>Expressive Singing</h1>
        <p>Nous accordons actuellement nos voix. Notre nouvelle plateforme dédiée all'art vocal expressif arrive bientôt.</p>
    </div>

    <script>
        let currentLang = 'en';
        function toggleLang() {
            const en = document.getElementById('en-content');
            const fr = document.getElementById('fr-content');
            const btn = document.getElementById('langBtn');

            if (currentLang === 'en') {
                en.style.display = 'none';
                fr.style.display = 'block';
                btn.innerText = 'EN';
                currentLang = 'fr';
            } else {
                en.style.display = 'block';
                fr.style.display = 'none';
                btn.innerText = 'FR';
                currentLang = 'en';
            }
        }
    </script>
</body>
</html>
