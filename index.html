<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expressive Singing - Under Construction</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #2d3436;
        }
        .card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            border: 1px solid #eee;
        }
        .logo-placeholder {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #0984e3;
        }
        p {
            font-size: 1.1rem;
            color: #636e72;
            line-height: 1.6;
        }
        .loader {
            margin-top: 2rem;
            height: 4px;
            width: 100%;
            background-color: #dfe6e9;
            border-radius: 10px;
            overflow: hidden;
        }
        .loader-bar {
            height: 100%;
            width: 30%;
            background-color: #0984e3;
            border-radius: 10px;
            animation: loading 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes loading {
            0% { margin-left: -30%; }
            100% { margin-left: 100%; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-placeholder">🎙️</div>
        <h1>Hey, this is Expressive Singing</h1>
        <p>This website is under construction,<br>please be patient.</p>
        
        <div class="loader">
            <div class="loader-bar"></div>
        </div>
    </div>

</body>
</html>
