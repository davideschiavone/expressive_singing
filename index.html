<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expressive Singing | Coming Soon</title>
    <style>
        :root {
            --bg-color: #f5eee6; 
            --navy: #1a2238;    
            --red: #d1493e;     
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--navy);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .nav-top-left {
            position: absolute;
            top: 25px;
            left: 25px;
        }

        .lang-switcher {
            position: absolute;
            top: 25px;
            right: 25px;
        }

        button.lang-btn {
            background: var(--navy);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        .logo-container {
            max-width: 300px;
            margin-bottom: 20px;
        }

        .logo-container img {
            width: 100%;
            height: auto;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.3rem;
            max-width: 600px;
            line-height: 1.6;
        }

        .status-tag {
            display: inline-block;
            background: var(--red);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 1rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .about-link {
            color: var(--navy);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.4rem;
            border-bottom: 3px solid var(--red);
            padding-bottom: 4px;
            text-transform: uppercase;
        }

        [lang="fr"] { display: none; }
    </style>
</head>
<body>

    <div class="nav-top-left">
        <a href="about.html" class="about-link" id="aboutLink">Who are we?</a>
    </div>

    <div class="lang-switcher">
        <button class="lang-btn" onclick="toggleLang()" id="langBtn">FR</button>
    </div>

    <div class="logo-container">
        <img src="logo.png" alt="Expressive Singing Logo" onerror="this.src='https://raw.githubusercontent.com/davideschiavone/expressive_singing/main/logo.png'">
    </div>

    <div id="en-content" lang="en">
        <div class="status-tag">UNDER CONSTRUCTION</div>
        <h1>Expressive Singing</h1>
        <p>We are currently tuning our voices. Our new platform for expressive vocal art is coming soon.</p>
    </div>

    <div id="fr-content" lang="fr">
        <div class="status-tag">EN CONSTRUCTION</div>
        <h1>Expressive Singing</h1>
        <p>Nous accordons actuellement nos voix. Notre nouvelle plateforme dédiée à l'art vocal expressif arrive bientôt.</p>
    </div>

    <script>
        let currentLang = 'en';
        function toggleLang() {
            const en = document.getElementById('en-content');
            const fr = document.getElementById('fr-content');
            const btn = document.getElementById('langBtn');
            const aboutLink = document.getElementById('aboutLink');

            if (currentLang === 'en') {
                en.style.display = 'none';
                fr.style.display = 'block';
                btn.innerText = 'EN';
                aboutLink.innerText = 'Qui sommes-nous ?';
                currentLang = 'fr';
            } else {
                en.style.display = 'block';
                fr.style.display = 'none';
                btn.innerText = 'FR';
                aboutLink.innerText = 'Who are we?';
                currentLang = 'en';
            }
        }
    </script>
</body>
</html>
